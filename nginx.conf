server {
    listen 80;
    server_name onbozor.uz www.onbozor.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name onbozor.uz www.onbozor.uz;

    ssl_certificate /etc/letsencrypt/live/onbozor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onbozor.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10M;

    # Frontend — static files
    location / {
        root /var/www/onbozor/dist;
        try_files $uri $uri/ /index.html;

        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Auth, payments, upload, search, etc. — all backend routes
    location ~ ^/(auth|listings|shops|search|favourites|referral|payments|notifications|upload|admin|health|bot)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
