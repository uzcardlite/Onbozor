[build]
builder = "nixpacks"

# Web service runs ONLY the FastAPI server. The Telegram bot runs as a separate
# service/worker: `python -m app.bot_runner` (see Procfile `worker`).
# ${PORT:-8000} binds Railway's assigned $PORT (defaulting to 8000) so the public
# domain can actually reach uvicorn — a hardcoded port causes 502 Bad Gateway.
[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
