[build]
builder = "nixpacks"

# Web service runs DB migrations, then ONLY the FastAPI server. The Telegram bot
# runs as a separate service/worker: `python -m app.bot_runner` (Procfile `worker`).
# `alembic upgrade head` applies any pending migrations (e.g. the user
# gamification columns) before the API starts serving.
[deploy]
startCommand = "python -m app.bot_runner"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
