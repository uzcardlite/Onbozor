name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'alembic/**'
      - 'requirements.txt'
      - 'railway.toml'
      - 'Dockerfile'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: onbozor_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/onbozor_test
          BOT_TOKEN: test:token
          JWT_SECRET: test-secret
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/onbozor_test
        run: alembic upgrade head

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: curl -fsSL https://railway.app/install.sh | sh

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service onbozor-api
